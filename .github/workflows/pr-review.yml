name: Vehicle Rental PR Review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compile Project
        run: |
          find . -name "*.java" > sources.txt
          javac @sources.txt

      - name: Check Vehicle Abstract Class
        run: |
          grep -R "abstract class Vehicle" .

      - name: Check Inheritance
        run: |
          grep -R "extends Vehicle" .

      - name: Check Method Overriding
        run: |
          grep -R "@Override" .

      - name: Fail On TODO Comments
        run: |
          ! grep -R "TODO" .
